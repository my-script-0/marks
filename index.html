<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>منصة رصد الدرجات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: inherit;
            cursor: pointer;
            min-width: 150px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            text-align: center;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
        }
        .header-blue { background-color: #cce0f5; }
        .header-green { background-color: #e2f0d9; }
        .header-orange { background-color: #fce4d6; }
        
        input[type="number"] {
            width: 45px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px;
            font-weight: bold;
        }
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .btn-submit {
            display: block;
            width: 250px;
            margin: 30px auto;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #2ecc71;
        }
        .form-section { display: none; }
        .active-form { display: block; }
    </style>
</head>

        function updateView() {
            const grade = document.getElementById("gradeSelect").value;
            const section = document.getElementById("sectionSelect").value;

            // إخفاء/إظهار خيار الشعبة 5 بناءً على الصف
            if (grade === "9") {
                document.getElementById("sec5").style.display = "none";
                if (section === "5") document.getElementById("sectionSelect").value = "1";
            } else {
                document.getElementById("sec5").style.display = "block";
            }

            // إخفاء الجدولين وإظهار الجدول المناسب
            document.getElementById("form6").classList.remove("active-form");
            document.getElementById("form9").classList.remove("active-form");
            document.getElementById("form" + grade).classList.add("active-form");

            renderTable(grade, document.getElementById("sectionSelect").value);
        }

        function renderTable(grade, section) {
            const tbody = document.getElementById("tbody" + grade);
            tbody.innerHTML = ""; // مسح البيانات السابقة
            
            const students = studentsData[grade][section] || [];
            
            students.forEach((name, index) => {
                let row = document.createElement("tr");
                
                if (grade === "6") {
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td style="text-align: right; padding-right: 10px;">${name}</td>
                        <td><input type="number" class="col-calc" max="10" oninput="calc(this, '6')"></td>
                        <td><input type="number" class="col-calc" max="10" oninput="calc(this, '6')"></td>
                        <td class="t-dialogue header-orange" style="font-weight: bold;">0</td>
                        
                        <td><input type="number" class="col-calc" max="5" oninput="calc(this, '6')"></td>
                        <td><input type="number" class="col-calc" max="5" oninput="calc(this, '6')"></td>
                        <td><input type="number" class="col-calc" max="5" oninput="calc(this, '6')"></td>
                        <td><input type="number" class="col-calc" max="5" oninput="calc(this, '6')"></td>
                        <td class="t-quiz header-orange" style="font-weight: bold;">0</td>

                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '6')"></td>
                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '6')"></td>
                        <td class="t-activity header-orange" style="font-weight: bold;">0</td>

                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '6')"></td>
                        <td class="t-grand header-orange" style="font-weight: bold;">0</td>
                    `;
                } else if (grade === "9") {
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td style="text-align: right; padding-right: 10px;">${name}</td>
                        <td><input type="number" class="col-calc" max="10" oninput="calc(this, '9')"></td>
                        <td><input type="number" class="col-calc" max="10" oninput="calc(this, '9')"></td>
                        <td class="t-dialogue header-orange" style="font-weight: bold;">0</td>
                        
                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '9')"></td>
                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '9')"></td>
                        <td class="t-activity header-orange" style="font-weight: bold;">0</td>

                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '9')"></td>
                        <td><input type="number" class="col-calc" max="20" oninput="calc(this, '9')"></td>
                        <td class="t-grand header-orange" style="font-weight: bold;">0</td>
                    `;
                }
                tbody.appendChild(row);
            });
        }

        // دالة الحساب الموحدة
        function calc(input, grade) {
            let tr = input.closest('tr');
            let inputs = tr.querySelectorAll('input');
            let values = Array.from(inputs).map(inp => parseFloat(inp.value) || 0);

            if (grade === "6") {
                let diag = values[0] + values[1];
                let quiz = values[2] + values[3] + values[4] + values[5];
                let act = values[6] + values[7];
                let proj = values[8];
                
                tr.querySelector('.t-dialogue').innerText = diag;
                tr.querySelector('.t-quiz').innerText = quiz;
                tr.querySelector('.t-activity').innerText = act;
                tr.querySelector('.t-grand').innerText = diag + quiz + act + proj;
            } else if (grade === "9") {
                let diag = values[0] + values[1];
                let act = values[2] + values[3];
                let test = values[4];
                let proj = values[5];

                tr.querySelector('.t-dialogue').innerText = diag;
                tr.querySelector('.t-activity').innerText = act;
                tr.querySelector('.t-grand').innerText = diag + act + test + proj;
            }
        }

       function submitData() {
            const grade = document.getElementById("gradeSelect").value;
            const section = document.getElementById("sectionSelect").value;
            const tbody = document.getElementById("tbody" + grade);
            const rows = tbody.querySelectorAll("tr");
            
            let studentsData = [];
            
            // تجميع درجات جميع الطلاب في الشعبة
            rows.forEach(row => {
                let inputs = row.querySelectorAll("input.col-calc");
                let name = row.cells[1].innerText;
                
                if (grade === "6") {
                    studentsData.push({
                        name: name,
                        d1: inputs[0].value || 0, d2: inputs[1].value || 0, tDiag: row.querySelector('.t-dialogue').innerText,
                        q1: inputs[2].value || 0, q2: inputs[3].value || 0, q3: inputs[4].value || 0, q4: inputs[5].value || 0, tQuiz: row.querySelector('.t-quiz').innerText,
                        a1: inputs[6].value || 0, a2: inputs[7].value || 0, tAct: row.querySelector('.t-activity').innerText,
                        proj: inputs[8].value || 0, total: row.querySelector('.t-grand').innerText
                    });
                } else if (grade === "9") {
                    studentsData.push({
                        name: name,
                        d1: inputs[0].value || 0, d2: inputs[1].value || 0, tDiag: row.querySelector('.t-dialogue').innerText,
                        a1: inputs[2].value || 0, a2: inputs[3].value || 0, tAct: row.querySelector('.t-activity').innerText,
                        test: inputs[4].value || 0, proj: inputs[5].value || 0, total: row.querySelector('.t-grand').innerText
                    });
                }
            });

            const payload = {
                grade: grade,
                section: section,
                students: studentsData
            };

            // ---- ضع الرابط الخاص بك هنا ----
            const scriptURL = 'https://script.google.com/macros/s/AKfycbx1JzCbTDShZc-J-G7N5QsCOn5Ch-FIIUDXkZ2Am6cguMBZ8V6Hmw-6hCDgr1b8ZeLE8g/exec';
            
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerText;
            btn.innerText = "جاري إرسال الدرجات...";
            btn.style.backgroundColor = "#7f8c8d";
            btn.disabled = true;

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === 'success') {
                    alert('تم حفظ درجات الشعبة بنجاح في Google Sheets!');
                } else {
                    alert('حدث خطأ أثناء الحفظ.');
                }
                btn.innerText = originalText;
                btn.style.backgroundColor = "#27ae60";
                btn.disabled = false;
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('البيانات أُرسلت ولكن حدث خطأ في الاستجابة (يعمل بشكل طبيعي مع جوجل).');
                btn.innerText = originalText;
                btn.style.backgroundColor = "#27ae60";
                btn.disabled = false;
            });
        }

        // تشغيل مبدئي عند فتح الصفحة
        window.onload = updateView;
    </script>
